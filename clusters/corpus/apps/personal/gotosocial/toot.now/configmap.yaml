apiVersion: v1
kind: ConfigMap
metadata:
  name: toot-now-config
  namespace: personal
data:
  config.yaml: |
    log-level: "info"
    application-name: "Toot Now"
    host: "toot.now"
    account-domain: "toot.now"
    instance-robots-allow-indexing: true

    media-local-max-size: 200MiB
    media-image-size-hint: 5MiB
    media-video-size-hint: 100MiB
    media-remote-max-size: 200MiB

    media-emoji-local-max-size: 1MiB
    media-emoji-remote-max-size: 1MiB

    protocol: "https"
    bind-address: "0.0.0.0"
    trusted-proxies:
      - 172.23.0.0/16
    advanced-rate-limit-exceptions:
      - 172.23.0.0/16

    db-type: "sqlite"
    db-address: "/gotosocial/db/database.sqlite"
    storage-backend: "local"
    storage-local-base-path: "/gotosocial/storage"

    accounts-registration-open: false
    accounts-reason-required: true

    tls-certificate-chain: /tls/fullchain.pem
    tls-certificate-key: /tls/privkey.pem
