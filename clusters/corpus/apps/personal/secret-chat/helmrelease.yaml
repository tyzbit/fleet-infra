# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/app-template-4.1.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app secret-chat
  namespace: flux-system
spec:
  releaseName: *app
  targetNamespace: personal
  timeout: 15m
  interval: 2m0s
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      db:
        replicas: 1 # active longhorn
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          nodeSelector:
            longhorn: primary

        containers:
          &db secret-chat-db:
            image:
              repository: mariadb
              tag: "10.8"
              pullPolicy: Always
            envFrom:
              - secretRef:
                  name: secret-chat-db
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

      app:
        replicas: 1
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          &app secret-chat-app:
            image:
              repository: nextcloud
              tag: &secretchatver "33.0.0"
              pullPolicy: Always
            securityContext:
              privileged: true
            env: &ncenv
              PHP_OPCACHE_MEMORY_CONSUMPTION: "256"
              TRUSTED_PROXIES: 127.0.0.1 172.23.0.0/16
              OVERWRITE_PROTOCOL: https
              SMTP_HOST: email-smtp.us-east-1.amazonaws.com
              SMTP_SECURE: tls
              SMTP_PORT: 587
            envFrom:
              - secretRef:
                  name: secret-chat-config
            resources:
              requests:
                cpu: &nccpurequest 100m
              limits:
                memory: &ncmemlimit 4Gi

          secret-chat-talk-backend:
            image:
              repository: ghcr.io/nextcloud-releases/aio-talk
              tag: "20260218_123804"
              pullPolicy: Always
            env:
              NC_DOMAIN: secret.${chat_domain}
              TALK_HOST: talk.secret.${chat_domain}
              TZ: America/New_York
              TALK_PORT: 3478
            envFrom:
              - secretRef:
                  name: secret-chat-config

          &cache secret-chat-cache:
            image:
              repository: redis
              tag: "8.6"
              pullPolicy: Always
            command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 256Mi

          &worker secret-chat-worker:
            image:
              repository: nextcloud
              tag: *secretchatver
              pullPolicy: Always
            command: ["/bin/bash", "-c"]
            env: *ncenv
            args:
              - |
                ops=(
                  "db:add-missing-primary-keys"
                  "db:add-missing-indices"
                  "db:add-missing-columns"
                  "files:cleanup"
                )
                grey="\e[1;30m"
                reset="\e[0m"
                green="\e[1;32m"
                red="\e[1;31m"
                for op in "$${ops[@]}" ; do
                  echo -e "$${grey}Running php occ $op $reset"
                  su www-data -s /usr/local/bin/php -- occ $op && echo -en "$green" || echo -en "$red"
                  echo -e "Finished php occ $op $reset"
                done &&
                echo -e "$${grey}Running php occ maintenance:repair --include-expensive $reset"
                su www-data -s /usr/local/bin/php -- occ maintenance:repair --include-expensive && echo -en "$green" || echo -en "$red"
                echo -e "Finished php occ maintenance:repair --include-expensive $reset"
                while :; do /cron.sh; done
            resources:
              requests:
                cpu: *nccpurequest
              limits:
                memory: *ncmemlimit

          # Requires https://github.com/nextcloud/notify_push to be installed
          &push secret-chat-push:
            image:
              repository: nextcloud
              tag: *secretchatver
              pullPolicy: Always
            command: ["/bin/bash", "-c"]
            env:
              <<: *ncenv
              NEXTCLOUD_URL: http://127.0.0.1
            args:
              - |
                chmod +x /var/www/html/custom_apps/notify_push/bin/x86_64/notify_push && \
                while :; do su www-data \
                  -s /var/www/html/custom_apps/notify_push/bin/x86_64/notify_push -- \
                  /var/www/html/config/config.php; sleep 1; done &
                pid=$!
                grey="\e[1;30m"
                reset="\e[0m"
                green="\e[1;32m"
                red="\e[1;31m"
                echo -e "$${grey}Waiting a few seconds for services to start$${reset}"
                sleep 10
                echo -e "$${grey}Testing if push app is configured"
                op="notify_push:setup https://secret.${chat_domain}/push"
                while ! su www-data -s /usr/local/bin/php -- occ "notify_push:self-test"; do
                  echo -e "$${grey}Self-test failed, running php occ $op $reset"
                  if ! su www-data -s /usr/local/bin/php -- occ $op; then
                    echo -e "$${red}$${op} operation failed, retrying...$${reset}"
                    sleep 5
                  fi
                done
                echo -e "$${green}Test passed$${reset}"
                wait $pid
            resources:
              requests:
                cpu: *nccpurequest
              limits:
                memory: *ncmemlimit

    persistence:
      # MariaDB
      db:
        existingClaim: secret-chat-mariadb-longhorn-database
        advancedMounts:
          db:
            *db :
              - path: /var/lib/mysql
      db-config:
        name: secret-chat-db-config
        type: configMap
        advancedMounts:
          db:
            *db :
              - path: /etc/mysql/conf.d
                readOnly: true

      # Nextcloud
      data:
        existingClaim: secret-chat-data-nas
        advancedMounts:
          app:
            *app :
              - path: &datamount /var/www/html
            *worker :
              - path: *datamount
            *push :
              - path: *datamount
      socket:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          app:
            *app :
              - path: &redispath /var/run/redis/
            *cache :
              - path: *redispath
            *worker :
              - path: *redispath
            *push :
              - path: *redispath

      # Redis-only
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          app:
            *cache :
              - path: /data
      cache-config:
        name: secret-chat-cache-config
        type: configMap
        advancedMounts:
          app:
            *cache :
              - path: /usr/local/etc/redis/redis.conf
                subPath: redis.conf
                readOnly: true

    service:
      main:
        controller: app
        type: ClusterIP
        ports:
          http:
            primary: true
            port: 80

      push:
        controller: app
        type: ClusterIP
        ports:
          http:
            primary: true
            port: 7867
            
      talk:
        controller: app
        type: ClusterIP
        ports:
          http:
            primary: true
            port: 8181
          talk:
            port: 3478

      db:
        controller: db
        type: ClusterIP
        ports:
          mariadb:
            primary: true
            port: 3306

    ingress:
      app:
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: 20480m
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "20"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "14400"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "14400"
          cert-manager.io/cluster-issuer: letsencrypt
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/target: ${cloudflared_tunnel_uuid}.cfargotunnel.com
        hosts:
          - host: &host "secret.${chat_domain}"
            paths:
              - path: "/hpb"
                service:
                  identifier: talk
                  port: 8181
              - path: "/push"
                service:
                  identifier: push
              - path: "/"
                service:
                  identifier: main
        tls:
          - hosts:
              - *host
            secretName: *host

      talk:
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: 20480m
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "20"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "14400"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "14400"
          cert-manager.io/cluster-issuer: letsencrypt
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
          external-dns.alpha.kubernetes.io/target: ${home_domain_ddns}
        hosts:
          - host: &talkhost "talk.secret.${chat_domain}"
            paths:
              - path: "/"
                service:
                  identifier: talk
                  port: 8181
        tls:
          - hosts:
              - *talkhost
            secretName: *talkhost
